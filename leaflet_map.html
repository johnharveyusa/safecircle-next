
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<h2 class="sr-only">Interactive Leaflet map centered on Salt Lake City</h2>

<div id="map" style="width:100%;height:500px;border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary);"></div>

<script>
const map = L.map('map').setView([40.7608, -111.891], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19
}).addTo(map);

L.marker([40.7608, -111.891])
  .addTo(map)
  .bindPopup('<b>Salt Lake City</b>')
  .openPopup();
</script>
